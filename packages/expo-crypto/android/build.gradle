apply plugin: 'com.android.library'

group = 'to.brace.filecrypto'
version = '0.0.1'

def expoModulesCorePlugin = new File(project(":expo-modules-core").projectDir.absolutePath, "ExpoModulesCorePlugin.gradle")
apply from: expoModulesCorePlugin
applyKotlinExpoModulesCorePlugin()
useCoreDependencies()
useExpoPublishing()
useManagedAndroidSdkVersions()

android {
  namespace "to.brace.filecrypto"
  defaultConfig {
    versionCode 1
    versionName "0.0.1"
  }
  lintOptions {
    abortOnError false
  }
}
