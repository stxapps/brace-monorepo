<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brace — Status</title>
    <!--
      Set the `.dark` class before paint to avoid a flash of the wrong theme.
      Mirrors the popup's FOUC script (reads the "brace-theme" localStorage mirror
      the ThemeProvider keeps in sync with browser.storage.sync).
    -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('brace-theme');
          var s = raw ? JSON.parse(raw) : null;
          var m = s && s.mode ? s.mode : 'system';
          var sd = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var d;
          if (m === 'dark') {
            d = true;
          } else if (m === 'light') {
            d = false;
          } else if (m === 'custom') {
            var n = new Date();
            var c = n.getHours() * 60 + n.getMinutes();
            var t = function (x) {
              var p = String(x).split(':');
              return +p[0] * 60 + +p[1];
            };
            var ls = t((s && s.lightStart) || '06:00');
            var ds = t((s && s.darkStart) || '19:00');
            d = ls <= ds ? c >= ds || c < ls : c >= ds && c < ls;
          } else {
            d = sd;
          }
          document.documentElement.classList.toggle('dark', !!d);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
